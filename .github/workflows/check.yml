name: Vertretungsplan prüfen

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 5-21 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: State wiederherstellen
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: plan-state-dummy
          restore-keys: |
            plan-state-

      - name: Cache-Status prüfen
        run: |
          if [ -f state.json ]; then
            echo "✓ state.json aus Cache wiederhergestellt ($(wc -c < state.json) Bytes)"
          else
            echo "⚠ state.json NICHT gefunden — erster Durchlauf oder Cache verloren"
          fi

      # --- Push-Notifications ---
      - name: Vertretungsplan prüfen & benachrichtigen
        env:
          PLAN_URL: ${{ secrets.PLAN_URL }}
          PLAN_USER: ${{ secrets.PLAN_USER }}
          PLAN_PASS: ${{ secrets.PLAN_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_plan.py

      - name: State speichern
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: plan-state-${{ github.run_id }}

      # --- E-Mail-Fallback bei Notification-Fehler ---
      - name: E-Mail-Fallback bei fehlgeschlagener Push-Notification
        if: always()
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ ! -f state.json ]; then exit 0; fi
          FAILURES=$(python3 -c "
          import json, sys
          state = json.load(open('state.json'))
          failures = state.get('_notification_failures', [])
          if not failures:
              sys.exit(0)
          for f in failures:
              print(f'- {f[\"lehrer\"]} am {f[\"datum\"]} (Topic: {f[\"topic\"]})')
          " 2>/dev/null) || exit 0

          if [ -z "$FAILURES" ]; then exit 0; fi

          echo "::warning::Push-Notification(s) fehlgeschlagen:"
          echo "$FAILURES"

          if [ -n "$NOTIFY_EMAIL" ]; then
            echo "Sende E-Mail-Fallback an $NOTIFY_EMAIL..."
            # GitHub Actions kann über den Workflow selbst keine E-Mails senden.
            # Stattdessen: ntfy als Fallback auf einen separaten Kanal mit E-Mail-Weiterleitung.
            curl -s -o /dev/null -w "HTTP %{http_code}" \
              -H "Title: Vplan-Notification fehlgeschlagen" \
              -H "Priority: urgent" \
              -H "Tags: warning" \
              -H "Email: $NOTIFY_EMAIL" \
              -d "Push-Benachrichtigung konnte nicht zugestellt werden:
          $FAILURES

          Bitte ntfy-Konfiguration prüfen." \
              "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}-alerts" || true
          fi

      # --- Web-App aktualisieren ---
      - name: data.json für Web-App generieren
        env:
          PLAN_URL: ${{ secrets.PLAN_URL }}
          PLAN_USER: ${{ secrets.PLAN_USER }}
          PLAN_PASS: ${{ secrets.PLAN_PASS }}
        run: python generate_data.py

      - name: iCal-Dateien generieren
        run: python generate_ical.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json docs/ical/
          if git diff --cached --quiet; then
            echo "Keine Änderungen zu committen."
            exit 0
          fi
          git commit -m "Update plan data [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push fehlgeschlagen (Versuch $i) — neu rebasen und retry..."
            sleep $((i * 3))
          done
          echo "Push nach 5 Versuchen weiterhin fehlgeschlagen."
          exit 1
