<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Vertretungsplan">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23111' width='100' height='100' rx='22'/><text x='50' y='66' text-anchor='middle' fill='white' font-size='36' font-family='system-ui' font-weight='700'>VP</text></svg>">
  <link rel="manifest" href="manifest.json">
  <title>Vertretungsplan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --secondary: #86868b;
      --accent: #e8453c;
      --green: #34c759;
      --orange: #ff9f0a;
      --border: #e5e5ea;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* --- Navigation Bar --- */
    .navbar {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    .navbar .subtitle {
      font-size: 12px;
      color: var(--secondary);
      margin-top: 1px;
    }

    .nav-select {
      font-size: 15px;
      font-weight: 600;
      color: #007aff;
      background: none;
      border: none;
      padding: 6px 0;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    .nav-select option { color: var(--text); }

    .refresh-btn {
      background: none;
      border: none;
      font-size: 18px;
      color: #007aff;
      cursor: pointer;
      padding: 4px;
      transition: transform 0.3s;
    }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Card Container --- */
    main {
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 0.5px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 16px;
      overflow: hidden;
    }

    /* --- Week Header --- */
    .week-header {
      text-align: center;
      padding: 20px 16px 8px;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--secondary);
    }

    /* --- Plan Table --- */
    .plan-table {
      width: 100%;
      border-collapse: collapse;
    }

    .plan-table th {
      padding: 14px 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 0.5px solid var(--border);
    }
    .plan-table th:first-child { padding-left: 20px; text-align: left; }

    .col-std { width: 52px; }

    /* Period rows */
    .plan-table tbody tr {
      transition: background 0.15s;
    }
    .plan-table tbody tr:not(:last-child) td {
      border-bottom: 0.5px solid var(--border);
    }

    .plan-table td {
      padding: 10px 4px;
      text-align: center;
      vertical-align: middle;
      font-size: 13px;
    }

    /* Stunde column */
    .std-cell {
      text-align: left !important;
      padding-left: 20px !important;
    }
    .std-num {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .std-time {
      font-size: 10px;
      color: var(--secondary);
      margin-top: 2px;
    }

    /* Day cells */
    .day-cell {
      position: relative;
      min-width: 52px;
    }
    .day-cell .subject {
      font-size: 14px;
      font-weight: 600;
    }
    .day-cell .klasse {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .day-cell .room {
      font-size: 11px;
      color: var(--secondary);
    }
    .day-cell.empty {
      color: #d1d1d6;
    }

    /* Changed indicator */
    .day-cell.changed .subject,
    .day-cell.changed .klasse,
    .day-cell.changed .room {
      color: var(--accent);
    }

    .day-cell.cancelled .subject {
      font-size: 16px;
      color: var(--accent);
      font-weight: 700;
    }

    /* Info badge */
    .info-dot {
      position: absolute;
      top: 6px;
      right: 4px;
      width: 7px; height: 7px;
      background: #007aff;
      border-radius: 50%;
    }

    /* Aufsicht cells */
    .aufsicht-row td {
      padding: 4px;
      border-bottom: 0.5px solid var(--border) !important;
    }
    .aufsicht-cell {
      font-size: 9px;
      color: var(--accent);
      font-weight: 500;
      line-height: 1.2;
      text-align: center;
    }

    /* Day header with update time */
    .day-th-wrap .day-name {
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .day-th-wrap .day-date {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      text-transform: none;
      letter-spacing: -0.3px;
      margin-top: 1px;
    }
    .day-th-wrap .day-ts {
      font-size: 8px;
      font-weight: 400;
      color: #c7c7cc;
      text-transform: none;
      letter-spacing: 0;
      margin-top: 2px;
    }

    /* Today highlight */
    .day-today .day-date {
      color: white;
      background: var(--text);
      width: 26px; height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    /* Now line */
    .now-line td {
      padding: 0 !important;
      border-bottom: 2px solid var(--accent) !important;
      position: relative;
    }

    /* --- Info Popover --- */
    .info-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .info-overlay.visible { display: flex; }
    .info-sheet {
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 24px 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 500px;
      animation: sheetUp 0.25s ease-out;
    }
    .info-sheet p {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
    }
    .info-sheet .dismiss {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #007aff;
      background: #f2f2f7;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* --- Setup Screen --- */
    .setup-screen {
      text-align: center;
      padding: 48px 24px;
    }
    .setup-screen .icon { font-size: 56px; margin-bottom: 16px; }
    .setup-screen h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .setup-screen .desc {
      color: var(--secondary);
      font-size: 15px;
      margin-bottom: 24px;
    }
    .setup-screen select {
      font-size: 17px;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 280px;
      margin-bottom: 20px;
      background: white;
    }
    .setup-screen .btn {
      display: inline-block;
      background: var(--text);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.3px;
    }
    .setup-screen .hint {
      color: #c7c7cc;
      font-size: 12px;
      margin-top: 24px;
      line-height: 1.5;
    }

    .loading {
      text-align: center; padding: 80px 20px; color: var(--secondary);
    }
    .loading .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border); border-top-color: var(--text);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    /* --- Small screen fix: prevent Friday from being cut off --- */
    @media (max-width: 389px) {
      main { padding: 8px; }
      .col-std { width: 38px; }
      .std-cell { padding-left: 8px !important; }
      .plan-table th:first-child { padding-left: 8px; }
      .day-cell { min-width: 44px; }
      .plan-table td { padding: 8px 2px; font-size: 12px; }
      .day-cell .subject { font-size: 13px; }
      .day-cell .klasse, .day-cell .room { font-size: 11px; }
      .std-num { font-size: 15px; }
      .std-time { font-size: 9px; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div>
    <div class="title" id="navTitle">Vertretungsplan</div>
    <div class="subtitle" id="navSubtitle">Lade...</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <select class="nav-select" id="teacherSelect" onchange="switchTeacher(this.value)" style="display:none"></select>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()" style="display:none">&#x21bb;</button>
  </div>
</div>

<main id="content">
  <div class="loading">
    <div class="spinner"></div>
    Lade Vertretungsplan...
  </div>
</main>

<div class="info-overlay" id="infoOverlay" onclick="hideInfo()">
  <div class="info-sheet" onclick="event.stopPropagation()">
    <p id="infoText"></p>
    <button class="dismiss" onclick="hideInfo()">OK</button>
  </div>
</div>

<script>
const TIMES = {"1":"07:40","2":"08:25","3":"09:40","4":"10:25","5":"11:40","6":"12:25","7":"13:40","8":"14:25"};
const TIMES_END = {"1":"08:25","2":"09:10","3":"10:25","4":"11:10","5":"12:25","6":"13:10","7":"14:25","8":"15:10"};
const PAUSEN = {"3":"09:10","5":"11:10","7":"13:10"}; // Pausen VOR diesen Stunden
const PERIODS = ["1","2","3","4","5","6","7","8"];
const MONTH = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DOW = {1:"MO",2:"DI",3:"MI",4:"DO",5:"FR"};

let planData = null, currentTeacher = null, currentKW = null;

function getTeacher() {
  const p = new URLSearchParams(location.search);
  return p.get("l") || p.get("lehrer") || (() => { try { return localStorage.getItem("ebg_vplan_lehrer"); } catch(e) { return null; } })();
}
function saveTeacher(c) {
  try { localStorage.setItem("ebg_vplan_lehrer", c); } catch(e) {}
  const u = new URL(location); u.searchParams.set("l", c); history.replaceState(null, "", u);
}
function switchTeacher(c) { currentTeacher = c; saveTeacher(c); renderPlan(); }

async function loadData() {
  try {
    const r = await fetch("data.json?_=" + Date.now());
    if (!r.ok) throw 0;
    planData = await r.json();
    return true;
  } catch(e) { return false; }
}

function parseDate(ds) { return new Date(ds.slice(0,4)+"-"+ds.slice(4,6)+"-"+ds.slice(6,8)+"T00:00:00"); }

function showInfo(text) {
  document.getElementById("infoText").textContent = text;
  document.getElementById("infoOverlay").classList.add("visible");
}
function hideInfo() { document.getElementById("infoOverlay").classList.remove("visible"); }

async function doRefresh() {
  const b = document.getElementById("refreshBtn");
  b.classList.add("spinning");
  await loadData();
  if (currentTeacher) renderPlan();
  b.classList.remove("spinning");
}

function getKWList() {
  if (!planData?.wochen) return [];
  return Object.keys(planData.wochen).sort((a,b) => parseInt(a)-parseInt(b));
}

function changeWeek(dir) {
  const kws = getKWList();
  if (!kws.length) return;
  const idx = kws.indexOf(currentKW);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < kws.length) {
    currentKW = kws[newIdx];
    renderPlan();
  }
}

function renderTeacherSelect() {
  if (!planData?.lehrer) return;
  const s = document.getElementById("teacherSelect");
  s.innerHTML = planData.lehrer.map(l => `<option value="${l}" ${l===currentTeacher?"selected":""}>${l}</option>`).join("");
  s.style.display = "";
  document.getElementById("refreshBtn").style.display = "";
}

function renderSetup() {
  document.getElementById("navTitle").textContent = "Vertretungsplan";
  document.getElementById("navSubtitle").textContent = "Ernst-Barlach-Gymnasium";
  if (!planData?.lehrer) {
    document.getElementById("content").innerHTML = '<div class="loading">Keine Daten verfügbar.</div>';
    return;
  }
  const opts = planData.lehrer.map(l => `<option value="${l}">${l}</option>`).join("");
  document.getElementById("content").innerHTML = `
    <div class="setup-screen card">
      <div class="icon">📋</div>
      <h2>Dein Vertretungsplan</h2>
      <p class="desc">Wähle dein Kürzel, um deinen<br>persönlichen Plan zu sehen.</p>
      <select id="setupSelect">${opts}</select><br>
      <button class="btn" onclick="setupDone()">Plan anzeigen</button>
      <p class="hint">Tipp: Danach „Zum Home-Bildschirm" hinzufügen —<br>dann hast du deinen Plan mit einem Tipp.</p>
    </div>`;
}

function setupDone() {
  currentTeacher = document.getElementById("setupSelect").value;
  saveTeacher(currentTeacher);
  renderTeacherSelect();
  currentKW = planData.aktuelle_kw;
  renderPlan();
}

function renderPlan() {
  if (!planData || !currentTeacher || !currentKW) return;

  const wochen = planData.wochen || {};
  const week = wochen[currentKW];
  if (!week) {
    document.getElementById("content").innerHTML = '<div class="loading">Keine Daten für diese Woche.</div>';
    return;
  }

  const days = week.tage || {};
  // Immer Mo-Fr anzeigen, auch wenn manche Tage keine Daten haben
  const monday = parseDate(week.montag);
  const dayKeys = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday); d.setDate(d.getDate() + i);
    dayKeys.push(d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0"));
  }

  // Nav bar
  document.getElementById("navTitle").textContent = currentTeacher;
  document.getElementById("navSubtitle").textContent = `Stand: ${planData.generiert || ""}`;

  // KW nav arrows
  const kws = getKWList();
  const kwIdx = kws.indexOf(currentKW);
  const canPrev = kwIdx > 0;
  const canNext = kwIdx < kws.length - 1;

  // Today
  const now = new Date();
  const todayStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,"0") + String(now.getDate()).padStart(2,"0");

  // Find max period
  let maxP = 0;
  for (const dk of dayKeys) {
    const td = days[dk]?.lehrer?.[currentTeacher];
    if (td) {
      for (const e of td.entries) { const p = parseInt(e.stunde); if (p > maxP) maxP = p; }
      if (td.aufsichten) for (const a of td.aufsichten) { const p = parseInt(a.vor_stunde); if (p > maxP) maxP = p; }
    }
  }
  if (maxP === 0) maxP = 6;

  // Build grid: dayKey -> period -> entry
  const grid = {};
  // Build aufsicht grid: dayKey -> "vor_stunde" -> aufsicht
  const aufGrid = {};
  for (const dk of dayKeys) {
    grid[dk] = {};
    aufGrid[dk] = {};
    const td = days[dk]?.lehrer?.[currentTeacher];
    if (td) {
      for (const e of td.entries) grid[dk][e.stunde] = e;
      if (td.aufsichten) for (const a of td.aufsichten) aufGrid[dk][a.vor_stunde] = a;
    }
  }

  // KW Header with arrows
  const mFri = parseDate(dayKeys[4]);
  const mMon = parseDate(dayKeys[0]);
  let html = `<div class="week-header" style="display:flex;align-items:center;justify-content:center;gap:16px">
    <span onclick="changeWeek(-1)" style="cursor:pointer;font-size:18px;opacity:${canPrev ? '1' : '0.2'};padding:4px 8px">&lsaquo;</span>
    <span>KW ${week.kw} · ${mMon.getDate()}. ${MONTH[mMon.getMonth()]} – ${mFri.getDate()}. ${MONTH[mFri.getMonth()]} ${mFri.getFullYear()}</span>
    <span onclick="changeWeek(1)" style="cursor:pointer;font-size:18px;opacity:${canNext ? '1' : '0.2'};padding:4px 8px">&rsaquo;</span>
  </div>`;

  html += '<div class="card"><table class="plan-table">';

  // Day headers
  html += '<thead><tr><th class="col-std" style="text-align:left;padding-left:20px"></th>';
  for (const dk of dayKeys) {
    const d = parseDate(dk);
    const dow = DOW[d.getDay()] || "";
    const isToday = dk === todayStr;
    const ts = days[dk]?.zeitstempel || "";
    html += `<th><div class="day-th-wrap${isToday ? " day-today" : ""}">
      <div class="day-name">${dow}</div>
      <div class="day-date">${isToday
        ? '<span style="background:#1d1d1f;color:white;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px">'+d.getDate()+'</span>'
        : d.getDate()+'.'}</div>
      ${ts ? '<div class="day-ts">' + ts + '</div>' : ''}
    </div></th>`;
  }
  html += '</tr></thead><tbody>';

  // Period rows with Aufsicht/Pausen dazwischen
  for (let pi = 0; pi < maxP; pi++) {
    const period = PERIODS[pi];
    const timeStart = TIMES[period] || "";

    // Aufsicht-Zeile VOR dieser Stunde (wenn es eine Pause gibt)
    if (PAUSEN[period]) {
      const hasAnyAufsicht = dayKeys.some(dk => aufGrid[dk]?.[period]);
      if (hasAnyAufsicht) {
        html += '<tr class="aufsicht-row">';
        html += `<td class="aufsicht-cell" style="text-align:left;padding-left:12px;color:var(--secondary);font-size:9px">${PAUSEN[period]}</td>`;
        for (const dk of dayKeys) {
          const a = aufGrid[dk]?.[period];
          if (a) {
            const txt = a.ort + (a.info ? ' (' + a.info + ')' : '');
            const shortTxt = txt.length > 24 ? txt.substring(0, 22) + '...' : txt;
            html += `<td class="aufsicht-cell" onclick="showInfo('${txt.replace(/'/g, "\\'")}')">${shortTxt}</td>`;
          } else {
            html += '<td class="aufsicht-cell"></td>';
          }
        }
        html += '</tr>';
      }
    }

    html += '<tr>';
    html += `<td class="std-cell"><div class="std-num">${period}</div><div class="std-time">${timeStart}</div></td>`;

    for (const dk of dayKeys) {
      const e = grid[dk]?.[period];

      if (!e) {
        html += '<td class="day-cell empty"></td>';
        continue;
      }

      const isChanged = e.geaendert || e.info;
      const isCancelled = e.fach === "---";
      const hasInfo = !!e.info;
      const cls = isCancelled ? "day-cell changed cancelled" : isChanged ? "day-cell changed" : "day-cell";
      const infoClick = hasInfo ? ` onclick="showInfo('${e.info.replace(/'/g, "\\'")}')"` : "";
      const dot = hasInfo ? '<div class="info-dot"></div>' : "";

      html += `<td class="${cls}"${infoClick}>
        ${dot}
        <div class="subject">${e.fach}</div>
        <div class="klasse">${e.klasse}</div>
        <div class="room">${e.raum}</div>
      </td>`;
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  document.getElementById("content").innerHTML = html;
}

function getISOWeek(d) {
  const date = new Date(d.getTime());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

(async function() {
  const ok = await loadData();
  if (!ok) {
    document.getElementById("content").innerHTML = '<div class="loading">Daten werden geladen...</div>';
    document.getElementById("navSubtitle").textContent = "Keine Verbindung";
    return;
  }
  currentTeacher = getTeacher();
  currentKW = planData.aktuelle_kw;
  if (currentTeacher && planData.lehrer?.includes(currentTeacher)) {
    saveTeacher(currentTeacher); // In localStorage speichern, damit PWA-Starts ohne URL-Param funktionieren
    renderTeacherSelect();
    renderPlan();
  } else {
    renderSetup();
  }
  setInterval(doRefresh, 120000);
})();
</script>
</body>
</html>
